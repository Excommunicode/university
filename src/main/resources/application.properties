spring.application.name=university
server.port=8080


spring.datasource.url=jdbc:postgresql://localhost:5432/university_db
spring.datasource.username=test
spring.datasource.password=test


spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# MongoDB configuration
spring.data.mongodb.uri=mongodb://localhost:27017/university_mongo

# JWT configuration
jwt.secret=change_this_secret_key_in_prod_please
jwt.expiration-ms=3600000

# SMTP mail configuration (MailHog)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.ssl.enable=false

# Debug logging for email
spring.mail.properties.mail.debug=false
logging.level.org.springframework.mail=DEBUG
logging.level.com.sun.mail=DEBUG