version: '3.8'

services:
  postgres:
    image: postgres:17-alpine
    container_name: university_db
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - university_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:7.0
    container_name: university_mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: university_mongo
    volumes:
      - university_mongo_data:/data/db

volumes:
  university_pgdata:
  university_mongo_data: